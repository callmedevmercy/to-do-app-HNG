<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Todo App</title>
    <meta name="description" content="A testable, accessible, and responsive todo application">
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="page-container">
        
        <header class="app-header">
            <h1 class="app-title">Mercy's Tasks</h1>
            <button id="btn-open-modal" class="btn-add-task">
                <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Task
            </button>
        </header>

        <!-- Dynamic List Container -->
        <div id="todo-list" class="todo-list">
            <!-- Cards injected via JS -->
        </div>

        <footer class="app-footer">
            <p>Mercy &copy; HNG task</p>
        </footer>

    </main>

    <!-- Modal for Add/Edit -->
    <div id="task-modal" class="modal-overlay">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <header class="modal-header">
                <h2 id="modal-title" class="modal-title">Add New Task</h2>
                <button id="btn-close-modal" class="btn-close" aria-label="Close dialog">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </header>
            
            <form id="task-form" class="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" class="form-input" required placeholder="e.g. Finalize Strategy">
                </div>
                
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" class="form-input" required placeholder="Task details..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" class="form-input" required>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="task-due">Due Date</label>
                    <input type="datetime-local" id="task-due" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="task-tags">Tags (comma separated)</label>
                    <input type="text" id="task-tags" class="form-input" placeholder="work, urgent, marketing">
                </div>
                
                <div class="form-actions">
                    <button type="button" id="btn-cancel-task" class="btn btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-save">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main JS -->
    <script src="script.js"></script>
</body>
</html>
